syntax = "proto3";

package restate.journal.events;

message TransientErrorEvent {
  enum CommandType {
    INPUT = 0;
    OUTPUT = 1;
    GET_LAZY_STATE = 2;
    SET_STATE = 3;
    CLEAR_STATE = 4;
    CLEAR_ALL_STATE = 5;
    GET_LAZY_STATE_KEYS = 6;
    GET_EAGER_STATE = 7;
    GET_EAGER_STATE_KEYS = 8;
    GET_PROMISE = 9;
    PEEK_PROMISE = 10;
    COMPLETE_PROMISE = 11;
    SLEEP = 12;
    CALL = 13;
    ONE_WAY_CALL = 14;
    SEND_SIGNAL = 15;
    RUN = 16;
    ATTACH_INVOCATION = 17;
    GET_INVOCATION_OUTPUT = 18;
    COMPLETE_AWAKEABLE = 19;
  }

  uint32 error_code = 1;
  string error_message = 2;
  optional string error_stacktrace = 3;
  optional string restate_doc_error_code = 4;
  optional uint32 related_command_index = 5;
  optional string related_command_name = 6;
  optional CommandType related_command_type = 7;
}

message PausedEvent {
  TransientErrorEvent last_failure = 1;
}

message SuspendedEvent {
  Future awaiting_on = 1;
}

// Mirrors dev.restate.service.protocol.Future. Kept independent so this
// package owns its own wire format.
message Future {
  enum CombinatorType {
    UNKNOWN = 0;
    FIRST_COMPLETED = 1;
    ALL_COMPLETED = 2;
    FIRST_SUCCEEDED_OR_ALL_FAILED = 3;
    ALL_SUCCEEDED_OR_FIRST_FAILED = 4;
  }

  repeated uint32 waiting_completions = 1;
  repeated uint32 waiting_signals = 2;
  repeated string waiting_named_signals = 3;
  repeated Future nested_futures = 4;
  CombinatorType combinator_type = 5;
}