[package]
name = "restate-limiter"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Hierarchical concurrency limiter with 3-level rule matching"

[features]
default = []
# Enables bilrost encoding for limiter types that contain ReString
# (LimitKey, RulePattern). Lets external crates put those into bilrost
# messages without pulling in the rule book.
bilrost = ["dep:bilrost", "restate-util-string/bilrost"]
# Enables Serialize/Deserialize derives on the limiter's exposed
# value/patch types so they can flow through JSON APIs.
serde = ["dep:serde", "dep:restate-serde-util"]
# Enables utoipa::ToSchema derives on the limiter's exposed value/patch
# types so the admin REST model can reuse them in its OpenAPI spec.
schema = ["dep:utoipa"]
# Enables the persistent rule book (RuleBook, PersistedRule, RuleId,
# diff/apply_change machinery). Implies `bilrost` and `serde`.
rule-book = [
    "bilrost",
    "serde",
    "dep:bytes",
    "dep:generic-array",
    "dep:restate-clock",
    "dep:restate-encoding",
    "dep:xxhash-rust",
]

[dependencies]
restate-workspace-hack = { workspace = true }

restate-clock = { workspace = true, optional = true }
restate-encoding = { workspace = true, optional = true }
restate-serde-util = { workspace = true, optional = true }
restate-types = { workspace = true }
restate-util-string = { workspace = true }

bilrost = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
generic-array = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
slotmap = { workspace = true }
thiserror = { workspace = true }
utoipa = { workspace = true, optional = true }
xxhash-rust = { workspace = true, features = ["xxh3"], optional = true }

[dev-dependencies]
restate-limiter = { path = ".", default-features = false, features = ["rule-book"] }