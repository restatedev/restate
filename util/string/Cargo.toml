[package]
name = "restate-util-string"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[features]
default = []
serde = ["dep:serde", "compact_str/serde"]
bytes = ["dep:bytes", "compact_str/bytes"]
bilrost = ["dep:bilrost", "bytes"]

[dependencies]
restate-workspace-hack = { workspace = true }

bilrost = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
compact_str = { workspace = true, features = ["std"] }
ahash = { workspace = true }
serde = { workspace = true, optional = true }
hashbrown = { workspace = true }

[dev-dependencies]
restate-util-string = {path = ".", default-features = false, features = ["bytes", "bilrost", "serde"]}

